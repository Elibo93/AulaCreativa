# Configuración para conectar con el Docker de MySQL
# 'localhost' funciona porque Docker expone el puerto 3306 en tu máquina
spring.datasource.url=jdbc:mysql://localhost:3306/artia_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root

# Importante: Usar el dialecto de MySQL 8 (coincide con image: mysql:8.0)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 'update' mantiene los datos al reiniciar.
spring.jpa.hibernate.ddl-auto=update

logging.level.org.springframework=ERROR